<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Morphic Studio - Creator Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#c0c1ff","primary-container": "#8083ff","primary-fixed": "#e1e0ff","primary-fixed-dim": "#c0c1ff","on-primary": "#1000a9","on-primary-container": "#0d0096","inverse-primary": "#494bd6",
        "secondary": "#c6c6cc","secondary-container": "#47494e","secondary-fixed-dim": "#c6c6cc","on-secondary": "#2f3035","on-secondary-container": "#b7b8be",
        "tertiary": "#c4c6ce","tertiary-container": "#8e9098","on-tertiary": "#2d3037","on-tertiary-container": "#272a30",
        "surface": "#051424","surface-dim": "#051424","surface-bright": "#2c3a4c","surface-variant": "#273647","surface-container-lowest": "#010f1f","surface-container-low": "#0d1c2d","surface-container": "#122131","surface-container-high": "#1c2b3c","surface-container-highest": "#273647","surface-tint": "#c0c1ff",
        "background": "#051424","on-background": "#d4e4fa","on-surface": "#d4e4fa","on-surface-variant": "#c7c4d7","outline": "#908fa0","outline-variant": "#464554",
        "error": "#ffb4ab","error-container": "#93000a","on-error": "#690005","on-error-container": "#ffdad6",
      },
      borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
      spacing: { unit: "4px", "container-max": "1440px", "margin-desktop": "64px", "margin-mobile": "20px", gutter: "24px" },
      fontFamily: { "display-lg": ["EB Garamond"], "headline-lg": ["EB Garamond"], "headline-lg-mobile": ["EB Garamond"], "headline-md": ["EB Garamond"], "body-lg": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"], "label-md": ["JetBrains Mono"], "label-sm": ["JetBrains Mono"] },
      fontSize: {
        "display-lg": ["64px", { lineHeight: "72px", letterSpacing: "-0.02em", fontWeight: "500" }],
        "headline-lg": ["40px", { lineHeight: "48px", fontWeight: "500" }],
        "headline-lg-mobile": ["32px", { lineHeight: "40px", fontWeight: "500" }],
        "headline-md": ["28px", { lineHeight: "36px", fontWeight: "500" }],
        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
        "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.05em", fontWeight: "500" }],
        "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
      }
    }
  }
}
</script>
<style>
  .glass-card {
    background: linear-gradient(145deg, rgba(28,43,60,0.4) 0%, rgba(5,20,36,0.4) 100%);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .glass-card:hover { background: linear-gradient(145deg,rgba(39,54,71,0.6) 0%,rgba(13,28,45,0.6) 100%); border-color: rgba(192,193,255,0.3); box-shadow: 0 0 30px -5px rgba(73,75,214,0.2); transform: translateY(-2px); }
  .glass-card.selected { background: linear-gradient(145deg,rgba(39,54,71,0.6) 0%,rgba(13,28,45,0.6) 100%); border-color: rgba(192,193,255,0.8); box-shadow: 0 0 40px -5px rgba(73,75,214,0.4); transform: translateY(-2px); }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden antialiased" style="background-image: radial-gradient(circle at 50% -20%, rgba(73,75,214,0.15) 0%, rgba(5,20,36,0) 60%);">
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-16 w-full max-w-container-max mx-auto pb-32">
  <div class="text-center mb-16 w-full max-w-3xl">
    <p class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-4">Step 1 of 5</p>
    <h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-4">What kind of creator are you?</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant">Select a profile to tailor your Morphic Studio experience.</p>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 w-full max-w-5xl mb-24" id="role-grid">
    <button class="glass-card rounded-xl p-8 flex flex-col items-center text-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" onclick="selectCard(this)" role="radio" aria-checked="false">
      <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 transition-colors duration-300">
        <span class="material-symbols-outlined text-3xl text-primary transition-colors duration-300">edit_document</span>
      </div>
      <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Writer</h3>
      <p class="font-body-md text-body-md text-on-surface-variant">Novels, screenplays, and long-form narrative.</p>
    </button>
    <button class="glass-card rounded-xl p-8 flex flex-col items-center text-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" onclick="selectCard(this)" role="radio" aria-checked="false">
      <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 transition-colors duration-300">
        <span class="material-symbols-outlined text-3xl text-primary transition-colors duration-300">auto_stories</span>
      </div>
      <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Comic Creator</h3>
      <p class="font-body-md text-body-md text-on-surface-variant">Graphic novels, manga, and sequential art.</p>
    </button>
    <button class="glass-card rounded-xl p-8 flex flex-col items-center text-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" onclick="selectCard(this)" role="radio" aria-checked="false">
      <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 transition-colors duration-300">
        <span class="material-symbols-outlined text-3xl text-primary transition-colors duration-300">movie</span>
      </div>
      <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Animator</h3>
      <p class="font-body-md text-body-md text-on-surface-variant">Storyboarding, 2D/3D animation planning.</p>
    </button>
    <button class="glass-card rounded-xl p-8 flex flex-col items-center text-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" onclick="selectCard(this)" role="radio" aria-checked="false">
      <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 transition-colors duration-300">
        <span class="material-symbols-outlined text-3xl text-primary transition-colors duration-300">campaign</span>
      </div>
      <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Storyteller</h3>
      <p class="font-body-md text-body-md text-on-surface-variant">RPG campaigns, lore building, and world crafting.</p>
    </button>
    <button class="glass-card rounded-xl p-8 flex flex-col items-center text-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" onclick="selectCard(this)" role="radio" aria-checked="false">
      <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 transition-colors duration-300">
        <span class="material-symbols-outlined text-3xl text-primary transition-colors duration-300">business_center</span>
      </div>
      <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Studio</h3>
      <p class="font-body-md text-body-md text-on-surface-variant">Collaborative projects, large scale production.</p>
    </button>
    <button class="glass-card rounded-xl p-8 flex flex-col items-center text-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" onclick="selectCard(this)" role="radio" aria-checked="false">
      <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 transition-colors duration-300">
        <span class="material-symbols-outlined text-3xl text-primary transition-colors duration-300">palette</span>
      </div>
      <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Hobbyist</h3>
      <p class="font-body-md text-body-md text-on-surface-variant">Exploring ideas, personal projects, having fun.</p>
    </button>
  </div>
</main>
<div class="fixed bottom-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-t border-white/5 py-6 px-margin-mobile md:px-margin-desktop flex justify-between items-center">
  <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="/signin.html">Skip</a>
  <button class="bg-primary text-on-primary font-label-md text-label-md px-8 py-3 rounded-full hover:opacity-90 transition-all opacity-50 cursor-not-allowed" disabled id="nextBtn" onclick="window.location='/goals-atmosphere.html'">Next</button>
</div>
<script>
  function selectCard(el) {
    document.querySelectorAll('#role-grid button').forEach(c => {
      c.classList.remove('selected');
      c.setAttribute('aria-checked','false');
    });
    el.classList.add('selected');
    el.setAttribute('aria-checked','true');
    const btn = document.getElementById('nextBtn');
    btn.classList.remove('opacity-50','cursor-not-allowed');
    btn.removeAttribute('disabled');
  }
</script>
<script src="/morphic-ui.js"></script>
</body>
</html>
