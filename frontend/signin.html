<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Morphic Studio — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#c0c1ff", "on-primary": "#1000a9", "primary-container": "#8083ff",
        "on-primary-container": "#0d0096", "primary-fixed": "#e1e0ff",
        "background": "#051424", "on-background": "#d4e4fa",
        "surface": "#051424", "on-surface": "#d4e4fa",
        "surface-variant": "#273647", "on-surface-variant": "#c7c4d7",
        "surface-container-lowest": "#010f1f", "surface-container-low": "#0d1c2d",
        "surface-container": "#122131", "surface-container-high": "#1c2b3c",
        "surface-container-highest": "#273647",
        "outline": "#908fa0", "outline-variant": "#464554",
        "error": "#ffb4ab",
      },
      fontFamily: {
        "headline-lg": ["EB Garamond"], "headline-lg-mobile": ["EB Garamond"],
        "headline-md": ["EB Garamond"], "display-lg": ["EB Garamond"],
        "body-lg": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"],
        "label-md": ["JetBrains Mono"], "label-sm": ["JetBrains Mono"],
      },
      fontSize: {
        "headline-lg": ["40px", {lineHeight:"48px",fontWeight:"500"}],
        "headline-lg-mobile": ["32px", {lineHeight:"40px",fontWeight:"500"}],
        "headline-md": ["28px", {lineHeight:"36px",fontWeight:"500"}],
        "body-lg": ["18px", {lineHeight:"28px",fontWeight:"400"}],
        "body-md": ["16px", {lineHeight:"24px",fontWeight:"400"}],
        "label-md": ["14px", {lineHeight:"20px",letterSpacing:"0.05em",fontWeight:"500"}],
        "label-sm": ["12px", {lineHeight:"16px",letterSpacing:"0.05em",fontWeight:"500"}],
      },
    }
  }
}
</script>
<style>
  .glass-panel { background: rgba(26,29,35,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
  .glow-bg { background: radial-gradient(circle at 50% 40%, rgba(128,131,255,0.1) 0%, rgba(5,20,36,1) 70%); }
  .input-group { border-bottom: 1px solid #273647; transition: border-color 0.3s; }
  .input-group:focus-within { border-bottom-color: #c0c1ff; }
  .error-msg { display: none; color: #ffb4ab; font-size: 12px; margin-top: 4px; }
  .error-msg.show { display: block; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center glow-bg antialiased selection:bg-primary selection:text-on-primary px-5">

<!-- Back to home -->
<a href="index.html" class="fixed top-6 left-6 flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors font-label-sm text-label-sm">
  <span class="material-symbols-outlined text-[18px]">arrow_back</span>
  Back to Home
</a>

<main class="w-full max-w-[480px]">
  <!-- Header -->
  <div class="text-center mb-12">
    <a href="index.html" class="inline-flex items-center gap-3 mb-8">
      <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings:'FILL' 1">movie_filter</span>
      <span class="font-headline-md text-headline-md text-on-surface">Morphic Studio</span>
    </a>
    <h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background mb-2" id="page-title">Welcome Back</h1>
    <p class="font-body-md text-body-md text-on-surface-variant" id="page-subtitle">Sign in to continue your creative journey.</p>
  </div>

  <!-- Tab switcher -->
  <div class="flex bg-surface-container rounded-lg p-1 mb-8 border border-white/5">
    <button onclick="showTab('signin')" id="tab-signin" class="flex-1 py-2.5 rounded font-label-md text-label-md text-on-primary bg-primary transition-colors">Sign In</button>
    <button onclick="showTab('signup')" id="tab-signup" class="flex-1 py-2.5 rounded font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors">Create Account</button>
  </div>

  <!-- Glass Form Card -->
  <div class="glass-panel rounded-xl p-8 md:p-10 shadow-[0_20px_40px_-15px_rgba(0,0,0,0.6)]">

    <!-- Sign In Form -->
    <form id="signin-form" class="space-y-6" onsubmit="handleSignIn(event)">
      <div class="space-y-1">
        <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block" for="signin-email">Email Address</label>
        <div class="relative input-group group">
          <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">mail</span>
          <input class="w-full bg-transparent border-none focus:ring-0 text-on-background font-body-md text-body-md pl-8 py-3 placeholder:text-on-surface-variant/50 outline-none" id="signin-email" placeholder="director@morphic.studio" type="email" required/>
        </div>
      </div>
      <div class="space-y-1">
        <div class="flex items-center justify-between">
          <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block" for="signin-password">Password</label>
          <a class="font-label-sm text-label-sm text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
        </div>
        <div class="relative input-group group">
          <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">lock</span>
          <input class="w-full bg-transparent border-none focus:ring-0 text-on-background font-body-md text-body-md pl-8 py-3 placeholder:text-on-surface-variant/50 outline-none" id="signin-password" placeholder="••••••••" type="password" required/>
        </div>
        <p class="error-msg" id="signin-error">Invalid credentials. Please try again.</p>
      </div>
      <button type="submit" id="signin-btn" class="w-full bg-primary-container text-on-primary-container hover:bg-primary transition-colors duration-300 rounded-lg py-4 font-label-md text-label-md uppercase tracking-wider flex items-center justify-center gap-2 mt-8 shadow-[0_0_20px_rgba(128,131,255,0.2)]">
        <span>Sign In to Studio</span>
        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
      </button>
    </form>

    <!-- Sign Up Form (hidden by default) -->
    <form id="signup-form" class="space-y-5 hidden" onsubmit="handleSignUp(event)">
      <div class="space-y-1">
        <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Display Name</label>
        <div class="relative input-group group">
          <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">person</span>
          <input class="w-full bg-transparent border-none focus:ring-0 text-on-background font-body-md text-body-md pl-8 py-3 placeholder:text-on-surface-variant/50 outline-none" placeholder="Your Director Name" type="text" required/>
        </div>
      </div>
      <div class="space-y-1">
        <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Email Address</label>
        <div class="relative input-group group">
          <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">mail</span>
          <input class="w-full bg-transparent border-none focus:ring-0 text-on-background font-body-md text-body-md pl-8 py-3 placeholder:text-on-surface-variant/50 outline-none" placeholder="director@morphic.studio" type="email" required/>
        </div>
      </div>
      <div class="space-y-1">
        <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Password</label>
        <div class="relative input-group group">
          <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">lock</span>
          <input class="w-full bg-transparent border-none focus:ring-0 text-on-background font-body-md text-body-md pl-8 py-3 placeholder:text-on-surface-variant/50 outline-none" placeholder="Create a strong password" type="password" required/>
        </div>
      </div>
      <button type="submit" class="w-full bg-primary text-on-primary hover:opacity-90 transition-opacity rounded-lg py-4 font-label-md text-label-md uppercase tracking-wider flex items-center justify-center gap-2 mt-4 shadow-[0_0_20px_rgba(192,193,255,0.3)]">
        <span>Create My Studio</span>
        <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
      </button>
    </form>

    <!-- Divider -->
    <div class="mt-8 mb-6 flex items-center gap-4">
      <div class="h-px flex-1 bg-surface-variant"></div>
      <span class="font-label-sm text-label-sm text-on-surface-variant/60 uppercase">Or continue with</span>
      <div class="h-px flex-1 bg-surface-variant"></div>
    </div>

    <!-- Social -->
    <div class="grid grid-cols-2 gap-4">
      <button onclick="handleSocialLogin('google')" class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container hover:bg-surface-container-high transition-colors border border-white/5 rounded-lg text-on-background font-label-sm text-label-sm">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button onclick="handleSocialLogin('github')" class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container hover:bg-surface-container-high transition-colors border border-white/5 rounded-lg text-on-background font-label-sm text-label-sm">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z" fill-rule="evenodd"/></svg>
        GitHub
      </button>
    </div>
  </div>

  <div class="mt-8 text-center">
    <p class="font-body-md text-body-md text-on-surface-variant" id="bottom-link-text">
      Don't have an account?
      <a onclick="showTab('signup')" class="text-primary hover:opacity-80 transition-opacity ml-1 font-label-md cursor-pointer">Create Studio</a>
    </p>
  </div>
</main>

<script>
function showTab(tab) {
  const isSignIn = tab === 'signin';
  document.getElementById('signin-form').classList.toggle('hidden', !isSignIn);
  document.getElementById('signup-form').classList.toggle('hidden', isSignIn);
  document.getElementById('tab-signin').className = `flex-1 py-2.5 rounded font-label-md text-label-md transition-colors ${isSignIn ? 'text-on-primary bg-primary' : 'text-on-surface-variant hover:text-on-surface'}`;
  document.getElementById('tab-signup').className = `flex-1 py-2.5 rounded font-label-md text-label-md transition-colors ${!isSignIn ? 'text-on-primary bg-primary' : 'text-on-surface-variant hover:text-on-surface'}`;
  document.getElementById('page-title').textContent = isSignIn ? 'Welcome Back' : 'Create Your Studio';
  document.getElementById('page-subtitle').textContent = isSignIn ? 'Sign in to continue your creative journey.' : 'Initialize your creative universe.';
  document.getElementById('bottom-link-text').innerHTML = isSignIn
    ? `Don't have an account? <a onclick="showTab('signup')" class="text-primary hover:opacity-80 transition-opacity ml-1 font-label-md cursor-pointer">Create Studio</a>`
    : `Already have an account? <a onclick="showTab('signin')" class="text-primary hover:opacity-80 transition-opacity ml-1 font-label-md cursor-pointer">Sign In</a>`;
}

function handleSignIn(e) {
  e.preventDefault();
  const btn = document.getElementById('signin-btn');
  btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">autorenew</span><span>Signing In...</span>';
  btn.disabled = true;
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1200);
}

function handleSignUp(e) {
  e.preventDefault();
  window.location.href = 'new-project.html';
}

function handleSocialLogin(provider) {
  const btn = event.currentTarget;
  btn.textContent = 'Connecting...';
  btn.disabled = true;
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1500);
}
</script>
</body>
</html>
